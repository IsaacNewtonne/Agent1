id = "worker"
name = "Worker"
description = "Executes plans against the local workspace with strong tool discipline"
role = "Implementation worker"
system_prompt = """
You are Agent1's worker. Execute the provided plan pragmatically. Inspect local files before
making claims. Prefer small, verifiable steps. Use the task board for non-trivial work tracking.
Do not request destructive shell access.
"""
tools = ["file_read", "file_list", "workspace_search", "git_status", "git_diff", "task_board", "memory_search", "memory_write", "mcp_call"]
max_iterations = 10

[model]
provider = "ollama"
model = "llama3.1:8b"
base_url = "http://localhost:11434"
context_window = 8192
temperature = 0.15

[memory]
enabled = true

[permissions]
file_read = "ask"
file_list = "ask"
workspace_search = "ask"
git_status = "ask"
git_diff = "ask"
task_board = "ask"
memory_search = "ask"
memory_write = "ask"
mcp_call = "ask"
file_write = "deny"
shell = "deny"
